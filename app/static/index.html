<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DM Retriever</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c0a;
    --surface:   #0d1410;
    --border:    #1f3328;
    --green:     #39ff84;
    --green-dim: #1a7a3f;
    --green-glow:#39ff8444;
    --amber:     #ffb347;
    --red:       #ff4545;
    --blue:      #4fc3f7;
    --text:      #c8f0d8;
    --muted:     #4a7a5a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-head: 'Orbitron', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.18) 3px, rgba(0,0,0,.18) 4px);
    pointer-events: none; z-index: 9999;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.7) 100%);
    pointer-events: none; z-index: 9998;
  }

  .shell {
    min-height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  header {
    padding: 2.4rem 0 1.8rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    display: flex; align-items: baseline; gap: 1.2rem; flex-wrap: wrap;
  }

  .ip-info {
    margin-left: auto;
    font-size: .68rem;
    color: var(--muted);
    letter-spacing: .07em;
    line-height: 1.6;
    text-align: right;
    flex-shrink: 0;
  }

  .ip-info .ip-addr { color: var(--green); font-size: .78rem; }

  .logo {
    font-family: var(--font-head);
    font-size: 1.5rem; font-weight: 900; letter-spacing: .12em;
    color: var(--green);
    text-shadow: 0 0 18px var(--green-glow), 0 0 40px var(--green-glow);
    flex-shrink: 0;
  }
  .logo span { color: var(--muted); }
  .tagline { font-size: .72rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.6rem 1.8rem;
    margin-bottom: 1.4rem;
    position: relative;
  }
  .panel::before {
    content: attr(data-label);
    position: absolute; top: -10px; left: 16px;
    font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--green); background: var(--surface); padding: 0 8px;
  }

  /* ── Form ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; }
  @media (max-width: 560px) { .grid-2 { grid-template-columns: 1fr; } }

  label {
    display: block; font-size: .68rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: .4rem;
  }

  input[type="text"], select {
    width: 100%; background: #0a110d;
    border: 1px solid var(--border); color: var(--green);
    font-family: var(--font-mono); font-size: .95rem;
    padding: .55rem .8rem; outline: none; border-radius: 1px;
    transition: border-color .2s, box-shadow .2s; appearance: none;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--green-dim); box-shadow: 0 0 0 2px var(--green-glow);
  }
  input[type="text"]::placeholder { color: var(--muted); opacity: .5; }
  select option { background: #0a110d; }

  /* ── Toggle ── */
  .toggle-row { display: flex; align-items: center; gap: .7rem; padding: .4rem 0; }
  .toggle-row label { margin: 0; font-size: .75rem; cursor: pointer; color: var(--text); text-transform: none; letter-spacing: 0; }

  .cb { position: relative; width: 18px; height: 18px; flex-shrink: 0; }
  .cb input { opacity: 0; width: 0; height: 0; position: absolute; }
  .cb-box { display: block; width: 18px; height: 18px; border: 1.5px solid var(--green-dim); background: transparent; cursor: pointer; transition: background .15s, border-color .15s; }
  .cb input:checked ~ .cb-box { background: var(--green-dim); border-color: var(--green); }
  .cb-box::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); font-size: .7rem; color: var(--bg); transition: transform .15s; }
  .cb input:checked ~ .cb-box::after { transform: translate(-50%,-50%) scale(1); }

  /* ── File drop ── */
  .file-drop { border: 1px dashed var(--border); padding: .8rem 1rem; text-align: center; cursor: pointer; font-size: .8rem; color: var(--muted); border-radius: 1px; transition: border-color .2s, color .2s; position: relative; }
  .file-drop:hover { border-color: var(--green-dim); color: var(--text); }
  .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-drop.has-file { border-color: var(--green-dim); color: var(--green); }

  /* ── Buttons ── */
  .btn {
    width: 100%; margin-top: 1.4rem;
    background: transparent; border: 1.5px solid var(--green); color: var(--green);
    font-family: var(--font-head); font-size: .8rem; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    padding: .85rem 1rem; cursor: pointer; border-radius: 1px;
    transition: background .2s, box-shadow .2s, color .2s;
  }
  .btn:hover:not(:disabled) { background: var(--green-dim); color: #fff; box-shadow: 0 0 20px var(--green-glow); }
  .btn:disabled { opacity: .35; cursor: not-allowed; border-color: var(--muted); color: var(--muted); }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 6px var(--green-glow); }
    50%      { box-shadow: 0 0 22px var(--green-glow), 0 0 40px var(--green-glow); }
  }
  .btn.running { animation: pulse-border 1.6s ease-in-out infinite; }

  /* ── Playlist selector ── */
  .playlist-panel { display: none; }
  .playlist-panel.visible { display: block; }

  .pl-controls { display: flex; gap: 1rem; margin-bottom: .9rem; font-size: .72rem; color: var(--muted); align-items: center; }
  .pl-controls a { color: var(--green-dim); cursor: pointer; text-decoration: underline; letter-spacing: .05em; }
  .pl-controls a:hover { color: var(--green); }

  .pl-list { display: flex; flex-direction: column; gap: .4rem; max-height: 260px; overflow-y: auto; padding-right: .3rem; }
  .pl-list::-webkit-scrollbar { width: 4px; }
  .pl-list::-webkit-scrollbar-track { background: transparent; }
  .pl-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .pl-item { display: flex; align-items: center; gap: .7rem; padding: .45rem .6rem; border: 1px solid var(--border); border-radius: 1px; font-size: .8rem; transition: border-color .15s; }
  .pl-item:hover { border-color: var(--green-dim); }
  .pl-item .pl-name { flex: 1; color: var(--text); }
  .pl-item .pl-count { color: var(--muted); font-size: .72rem; white-space: nowrap; }

  .pl-loading { color: var(--muted); font-size: .8rem; padding: .8rem 0; text-align: center; }

  /* ── Terminal ── */
  .terminal {
    background: #050907; border: 1px solid var(--border); border-radius: 2px;
    min-height: 320px; max-height: 520px; overflow-y: auto;
    padding: 1rem 1.2rem; font-size: .82rem; line-height: 1.65; color: var(--text);
    scroll-behavior: smooth;
  }
  .terminal::-webkit-scrollbar { width: 5px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.info  { color: var(--text); }
  .log-line.ok    { color: var(--green); }
  .log-line.warn  { color: var(--amber); }
  .log-line.err   { color: var(--red); }
  .log-line.muted { color: var(--muted); }

  /* Progress bar inside terminal */
  .prog-line { display: flex; align-items: center; gap: .6rem; padding: .15rem 0; font-size: .8rem; color: var(--green-dim); }
  .prog-bar { flex: 1; height: 6px; background: #1a2e22; border-radius: 3px; overflow: hidden; max-width: 200px; }
  .prog-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .5s linear; box-shadow: 0 0 6px var(--green-glow); }
  .prog-meta { color: var(--muted); font-size: .75rem; white-space: nowrap; }

  .cursor { display: inline-block; width: 8px; height: 1em; background: var(--green); vertical-align: text-bottom; margin-left: 2px; animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Status bar ── */
  .status-bar { display: flex; align-items: center; gap: .7rem; font-size: .72rem; color: var(--muted); margin-bottom: .5rem; letter-spacing: .08em; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.idle    { background: var(--muted); }
  .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1s step-start infinite; }
  .dot.paused  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .dot.done    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot.stopped { background: var(--muted); }

  /* ── Active Jobs ── */
  .job-list { display: flex; flex-direction: column; gap: .5rem; }

  .job-item {
    display: flex; align-items: center; gap: .7rem;
    font-size: .78rem; padding: .4rem .7rem;
    border: 1px solid var(--border); border-radius: 1px;
    cursor: pointer; transition: border-color .2s;
    user-select: none;
  }
  .job-item:hover { border-color: var(--green-dim); }
  .job-item.selected { border-color: var(--green); background: #0f1f14; }

  .job-item .jid  { color: var(--muted); font-size: .68rem; white-space: nowrap; }
  .job-item .jusr { color: var(--green); flex: 1; }
  .job-item .jst  { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
  .job-item .jst.running { color: var(--green); }
  .job-item .jst.paused  { color: var(--amber); }
  .job-item .jst.done    { color: var(--green-dim); }
  .job-item .jst.error   { color: var(--red); }
  .job-item .jst.stopped { color: var(--muted); }
  .job-item .jst.pending { color: var(--amber); }

  /* action buttons inside job item */
  .job-actions { display: flex; gap: .35rem; flex-shrink: 0; }

  .jbtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: .68rem;
    padding: .15rem .45rem;
    cursor: pointer;
    border-radius: 1px;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  .jbtn:hover { border-color: var(--green-dim); color: var(--text); }
  .jbtn.pause:hover  { border-color: var(--amber); color: var(--amber); }
  .jbtn.resume:hover { border-color: var(--green); color: var(--green); }
  .jbtn.stop:hover   { border-color: var(--red); color: var(--red); }

  .empty-jobs { color: var(--muted); font-size: .78rem; text-align: center; padding: 1rem 0; }

  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .panel { animation: fadeUp .4s ease both; }
  .panel:nth-child(2) { animation-delay: .06s; }
  .panel:nth-child(3) { animation-delay: .12s; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">DM<span>//</span>RETRIEVER</div>
    <div class="tagline">Dailymotion channel backup utility</div>
    <div class="ip-info" id="ipInfo">—</div>
  </header>

  <!-- Config panel -->
  <div class="panel" data-label="Configuration">
    <div class="grid-2">
      <div>
        <label for="username">Channel Username</label>
        <input type="text" id="username" placeholder="e.g. johndoe" autocomplete="off" />
      </div>
      <div>
        <label for="quality">Max Quality</label>
        <select id="quality">
          <option value="best">Best Available (no cap)</option>
          <option value="2160">4K — 2160p</option>
          <option value="1080" selected>Full HD — 1080p</option>
          <option value="720">HD — 720p</option>
          <option value="480">SD — 480p</option>
          <option value="360">Low — 360p</option>
        </select>
      </div>
    </div>

    <div style="margin-top:1.1rem;" class="grid-2">
      <div>
        <label for="subfolder">Download Subfolder <span style="text-transform:none;letter-spacing:0;font-size:.65rem;">(optional)</span></label>
        <input type="text" id="subfolder" placeholder="e.g. my_backup or leave blank" autocomplete="off" />
      </div>
      <div></div>
    </div>

    <div style="margin-top:1.1rem;" class="grid-2">
      <div>
        <label>Cookies File <span style="text-transform:none;letter-spacing:0;font-size:.65rem;">(optional, for private videos)</span></label>
        <div class="file-drop" id="fileDrop">
          <input type="file" id="cookiesFile" accept=".txt" />
          <span id="fileLabel">Click or drag cookies.txt here</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;padding-top:1.4rem;">
        <div class="toggle-row">
          <label class="cb">
            <input type="checkbox" id="skipUncat" />
            <span class="cb-box"></span>
          </label>
          <label for="skipUncat">Skip uncategorized videos</label>
        </div>
      </div>
    </div>

    <button class="btn" id="btnFetch" onclick="fetchPlaylists()">
      ⊞ &nbsp; Fetch Playlists
    </button>
  </div>

  <!-- Playlist selection -->
  <div class="panel playlist-panel" id="playlistPanel" data-label="Playlist Selection">
    <div class="pl-controls">
      <span id="plCount">0 playlists</span>
      <a onclick="selectAll(true)">Select All</a>
      <a onclick="selectAll(false)">Deselect All</a>
    </div>
    <div class="pl-list" id="plList">
      <div class="pl-loading">Loading…</div>
    </div>
    <button class="btn" id="btnStart" onclick="startDownload()">
      ▶ &nbsp; Start Download
    </button>
  </div>

  <!-- Output log -->
  <div class="panel" id="logPanel" data-label="Output Log">
    <div class="status-bar">
      <div class="dot idle" id="statusDot"></div>
      <span id="statusText">idle — select a job or start a new one</span>
    </div>
    <div class="terminal" id="terminal">
      <span class="log-line muted">// No job selected.</span>
      <span class="cursor"></span>
    </div>
  </div>

  <!-- Active jobs -->
  <div class="panel" data-label="Active Jobs">
    <div class="job-list" id="jobList">
      <div class="empty-jobs">No jobs yet.</div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let jobsCache       = {};       // id → {id, username, status}
let selectedJobId   = null;     // which job's logs are shown
let viewingStream   = null;     // EventSource for currently viewed job
let fetchedPlaylists = [];

// ── File drop ─────────────────────────────────────────────────────────────────
document.getElementById('cookiesFile').addEventListener('change', function () {
  const label = document.getElementById('fileLabel');
  const drop  = document.getElementById('fileDrop');
  if (this.files.length) {
    label.textContent = '📄 ' + this.files[0].name;
    drop.classList.add('has-file');
  } else {
    label.textContent = 'Click or drag cookies.txt here';
    drop.classList.remove('has-file');
  }
});

// ── Playlist fetch & render ───────────────────────────────────────────────────
async function fetchPlaylists() {
  const username = document.getElementById('username').value.trim();
  if (!username) { appendLog('✗  Please enter a channel username.'); return; }

  const btn = document.getElementById('btnFetch');
  btn.disabled = true;
  btn.textContent = '⊞  Fetching…';

  const panel = document.getElementById('playlistPanel');
  const list  = document.getElementById('plList');
  panel.classList.add('visible');
  list.innerHTML = '<div class="pl-loading">Contacting Dailymotion API…</div>';

  try {
    const res  = await fetch(`/api/channel/playlists?username=${encodeURIComponent(username)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    fetchedPlaylists = data;
    renderPlaylists();
  } catch (e) {
    list.innerHTML = `<div class="pl-loading" style="color:var(--red)">✗  ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '⊞  Re-fetch Playlists';
  }
}

function renderPlaylists() {
  const list    = document.getElementById('plList');
  const countEl = document.getElementById('plCount');
  countEl.textContent = `${fetchedPlaylists.length} playlist(s)`;
  if (!fetchedPlaylists.length) {
    list.innerHTML = '<div class="pl-loading">No playlists found.</div>';
    return;
  }
  list.innerHTML = fetchedPlaylists.map(pl => `
    <div class="pl-item">
      <label class="cb" style="flex-shrink:0;">
        <input type="checkbox" class="pl-cb" data-id="${pl.id}" checked />
        <span class="cb-box"></span>
      </label>
      <span class="pl-name">${escHtml(pl.name || pl.id)}</span>
      <span class="pl-count">${pl.videos_total ?? '?'} videos</span>
    </div>
  `).join('');
}

function selectAll(checked) {
  document.querySelectorAll('.pl-cb').forEach(cb => cb.checked = checked);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Terminal helpers ──────────────────────────────────────────────────────────
function classifyLine(msg) {
  if (msg.startsWith('✅') || msg.startsWith('▶') || msg.startsWith('⬇')) return 'ok';
  if (msg.startsWith('⚠') || msg.startsWith('ℹ') || msg.startsWith('⏸') || msg.startsWith('⏹')) return 'warn';
  if (msg.startsWith('✗') || msg.startsWith('❌')) return 'err';
  if (msg.startsWith('//')) return 'muted';
  return 'info';
}

function appendLog(msg) {
  const t      = document.getElementById('terminal');
  const cursor = t.querySelector('.cursor');
  const line   = document.createElement('div');
  line.className = 'log-line ' + classifyLine(msg);
  line.textContent = msg;
  if (cursor) t.insertBefore(line, cursor);
  else        t.appendChild(line);
  t.scrollTop = t.scrollHeight;
}

let progEl = null;

function updateProgress(pct, speed, eta) {
  const t      = document.getElementById('terminal');
  const cursor = t.querySelector('.cursor');
  if (!progEl || !t.contains(progEl)) {
    progEl = document.createElement('div');
    progEl.className = 'prog-line';
    progEl.innerHTML = `<div class="prog-bar"><div class="prog-bar-fill" style="width:0%"></div></div><span class="prog-pct"></span><span class="prog-meta"></span>`;
    if (cursor) t.insertBefore(progEl, cursor);
    else        t.appendChild(progEl);
  }
  progEl.querySelector('.prog-bar-fill').style.width = Math.min(pct, 100) + '%';
  progEl.querySelector('.prog-pct').textContent = pct.toFixed(1) + '%';
  progEl.querySelector('.prog-meta').textContent = `${speed} · ETA ${eta}`;
  t.scrollTop = t.scrollHeight;
}

function clearProgress() {
  if (progEl && progEl.parentNode) progEl.parentNode.removeChild(progEl);
  progEl = null;
}

function clearLog() {
  document.getElementById('terminal').innerHTML = '<span class="cursor"></span>';
  progEl = null;
}

// ── Status bar ────────────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('statusDot').className  = 'dot ' + state;
  document.getElementById('statusText').textContent = text;
}

// ── View a job's logs ─────────────────────────────────────────────────────────
function viewJob(jobId) {
  if (viewingStream) { viewingStream.close(); viewingStream = null; }
  selectedJobId = jobId;
  clearLog();
  clearProgress();
  renderJobList();   // update selected highlight

  const job = jobsCache[jobId];
  if (!job) return;
  setStatus(job.status, `@${job.username} — ${job.status}`);

  viewingStream = new EventSource(`/api/jobs/${jobId}/logs`);

  viewingStream.onmessage = (e) => {
    const msg = e.data;
    if (msg === '__PING__') return;
    if (msg === '__DONE__') {
      viewingStream.close(); viewingStream = null;
      clearProgress();
      // update status from server
      fetch(`/api/jobs/${jobId}/status`).then(r => r.json()).then(d => {
        if (jobsCache[jobId]) jobsCache[jobId].status = d.status;
        setStatus(d.status, `@${d.username} — ${d.status}`);
        renderJobList();
      });
      return;
    }
    if (msg.startsWith('__PROG__')) {
      if (msg === '__PROG__DONE__') { clearProgress(); return; }
      const parts = msg.slice(8).split('|');
      updateProgress(parseFloat(parts[0]), parts[1] || '—', parts[2] || '—');
      return;
    }
    appendLog(msg.replace(/↵/g, '\n'));
  };

  viewingStream.onerror = () => {
    viewingStream.close(); viewingStream = null;
    clearProgress();
  };
}

// ── Start download ────────────────────────────────────────────────────────────
async function startDownload() {
  const username = document.getElementById('username').value.trim();
  if (!username) { appendLog('✗  Please enter a channel username.'); return; }

  const checkedBoxes = document.querySelectorAll('.pl-cb:checked');
  const selectedIds  = Array.from(checkedBoxes).map(cb => cb.dataset.id);

  if (fetchedPlaylists.length > 0 && selectedIds.length === 0) {
    appendLog('⚠  No playlists selected.'); return;
  }

  const fd = new FormData();
  fd.append('username',           username);
  fd.append('quality',            document.getElementById('quality').value);
  fd.append('subfolder',          document.getElementById('subfolder').value.trim());
  fd.append('skip_uncategorized', document.getElementById('skipUncat').checked);
  fd.append('playlist_ids',       JSON.stringify(selectedIds));
  const cookieFile = document.getElementById('cookiesFile').files[0];
  if (cookieFile) fd.append('cookies', cookieFile);

  let jobId;
  try {
    const res  = await fetch('/api/start', { method: 'POST', body: fd });
    const data = await res.json();
    jobId = data.job_id;
  } catch (e) {
    appendLog('❌  Failed to start job: ' + e.message); return;
  }

  jobsCache[jobId] = { id: jobId, username, status: 'running' };
  renderJobList();
  viewJob(jobId);   // auto-switch to the new job
}

// ── Job controls ──────────────────────────────────────────────────────────────
async function pauseJob(jobId, e) {
  e.stopPropagation();
  await fetch(`/api/jobs/${jobId}/pause`, { method: 'POST' });
  jobsCache[jobId].status = 'paused';
  renderJobList();
  if (selectedJobId === jobId) setStatus('paused', `@${jobsCache[jobId].username} — paused`);
}

async function resumeJob(jobId, e) {
  e.stopPropagation();
  await fetch(`/api/jobs/${jobId}/resume`, { method: 'POST' });
  jobsCache[jobId].status = 'running';
  renderJobList();
  if (selectedJobId === jobId) setStatus('running', `@${jobsCache[jobId].username} — running`);
}

async function stopJob(jobId, e) {
  e.stopPropagation();
  await fetch(`/api/jobs/${jobId}/stop`, { method: 'POST' });
  jobsCache[jobId].status = 'stopped';
  renderJobList();
  if (selectedJobId === jobId) setStatus('stopped', `@${jobsCache[jobId].username} — stopped`);
}

// ── Job list render ───────────────────────────────────────────────────────────
function renderJobList() {
  const list = document.getElementById('jobList');
  const jobs = Object.values(jobsCache).reverse();
  if (!jobs.length) {
    list.innerHTML = '<div class="empty-jobs">No jobs yet.</div>';
    return;
  }
  list.innerHTML = jobs.map(j => {
    const isSelected = j.id === selectedJobId;
    let actions = '';
    if (j.status === 'running') {
      actions = `<div class="job-actions">
        <button class="jbtn pause"  onclick="pauseJob('${j.id}',event)">⏸ Pause</button>
        <button class="jbtn stop"   onclick="stopJob('${j.id}',event)">⏹ Stop</button>
      </div>`;
    } else if (j.status === 'paused') {
      actions = `<div class="job-actions">
        <button class="jbtn resume" onclick="resumeJob('${j.id}',event)">▶ Resume</button>
        <button class="jbtn stop"   onclick="stopJob('${j.id}',event)">⏹ Stop</button>
      </div>`;
    }
    return `
      <div class="job-item${isSelected ? ' selected' : ''}" onclick="viewJob('${j.id}')">
        <span class="jid">${j.id}</span>
        <span class="jusr">@${j.username}</span>
        <span class="jst ${j.status}">${j.status}</span>
        ${actions}
      </div>`;
  }).join('');
}

// ── Poll server for job status updates ───────────────────────────────────────
async function pollJobs() {
  try {
    const res  = await fetch('/api/jobs');
    const data = await res.json();
    let changed = false;
    data.forEach(j => {
      const prev = jobsCache[j.id];
      if (!prev || prev.status !== j.status) changed = true;
      jobsCache[j.id] = { ...jobsCache[j.id], ...j };
    });
    if (changed) renderJobList();
  } catch (_) {}
}

pollJobs();
setInterval(pollJobs, 2000);

// ── Public IP info ────────────────────────────────────────────────────────────
(async () => {
  const el = document.getElementById('ipInfo');
  try {
    const d = await fetch('/api/ipinfo').then(r => r.json());
    const loc = [d.city, d.region, d.country].filter(Boolean).join(', ');
    const org = d.org || '';
    el.innerHTML = `<span class="ip-addr">${d.ip}</span><br>${loc}<br><span style="font-size:.63rem">${org}</span>`;
  } catch (_) {
    el.textContent = 'IP unavailable';
  }
})();
</script>
